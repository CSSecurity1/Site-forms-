<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>CS Security UK — Site Forms</title>
<style>
  :root{
    --navy:#144580;
    --navy-dark:#0d3260;
    --gold:#FAD30A;
    --bg:#F4F6F9;
    --card:#FFFFFF;
    --text:#1A2233;
    --muted:#5C6B85;
    --border:#DCE3EE;
    --danger:#B3261E;
    --danger-bg:#FDEDEC;
    --ok:#1E7B45;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    padding-bottom:calc(24px + env(safe-area-inset-bottom));}

  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--navy);color:#fff;
    padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 10px rgba(20,69,128,0.25);
  }
  header.topbar .backbtn{
    width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,0.14);
    color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex:none;
  }
  header.topbar .titles{flex:1;min-width:0;}
  header.topbar h1{margin:0;font-size:17px;font-weight:700;line-height:1.2;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header.topbar p{margin:1px 0 0;font-size:11.5px;color:rgba(255,255,255,0.75);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header.topbar .accent{height:3px;background:linear-gradient(90deg,var(--gold),transparent 85%);
    position:absolute;left:0;bottom:-3px;width:100%;}
  header.topbar .logowrap{width:34px;height:34px;border-radius:9px;background:#fff;
    display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;padding:3px;}
  header.topbar .logowrap img{width:100%;height:100%;object-fit:contain;}

  main{flex:1;padding:16px 14px 8px;}

  .hero{
    background:linear-gradient(135deg,var(--navy) 0%, var(--navy-dark) 100%);
    border-radius:18px;padding:20px 18px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;
  }
  .hero:after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
    background:radial-gradient(circle,rgba(250,211,10,0.35),transparent 70%);}
  .hero h2{margin:0 0 4px;font-size:19px;}
  .hero p{margin:0;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.45;}

  .formcard{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
    cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
  }
  .formcard:active{transform:scale(0.98);}
  .formcard .icon{width:42px;height:42px;border-radius:11px;background:#EEF3FB;color:var(--navy);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .formcard .body{flex:1;min-width:0;}
  .formcard .body h3{margin:0 0 2px;font-size:15px;color:var(--text);}
  .formcard .body p{margin:0;font-size:12.5px;color:var(--muted);}
  .formcard .count{font-size:11.5px;color:var(--navy);background:#EEF3FB;padding:3px 9px;
    border-radius:999px;font-weight:600;flex:none;}
  .formcard .chev{color:var(--muted);font-size:16px;flex:none;}

  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);
    font-weight:700;margin:22px 2px 8px;}

  .listrow{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .listrow .body{flex:1;min-width:0;}
  .listrow .body h4{margin:0 0 2px;font-size:14.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .listrow .body p{margin:0;font-size:12px;color:var(--muted);}
  .listrow .del{width:32px;height:32px;border-radius:9px;border:none;background:var(--danger-bg);
    color:var(--danger);font-size:15px;flex:none;}

  .btn{border:none;border-radius:11px;padding:11px 16px;font-size:14.5px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-gold{background:var(--gold);color:var(--navy-dark);}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 12px;font-size:13px;}
  .fab-new{width:100%;margin-bottom:16px;padding:13px;font-size:15px;}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px;}

  details.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:10px;overflow:hidden;}
  details.section > summary{list-style:none;padding:13px 14px;font-weight:700;font-size:14.5px;
    color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
  details.section > summary::-webkit-details-marker{display:none;}
  details.section > summary:after{content:"+";font-size:18px;font-weight:400;color:var(--muted);}
  details.section[open] > summary:after{content:"\2212";}
  details.section .inner{padding:2px 14px 14px;}
  .section-note{font-size:12px;color:var(--muted);margin:-2px 0 10px;font-style:italic;}
  .info-box{background:#EEF3FB;border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--navy);
    margin:10px 0 4px;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field input[type=text],.field input[type=tel],.field input[type=email],
  .field input[type=date],.field select,.field textarea{
    width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 11px;font-size:14.5px;
    background:#fff;color:var(--text);font-family:inherit;
  }
  .field textarea{min-height:64px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--navy);outline-offset:1px;}
  .checkgrid{display:flex;flex-wrap:wrap;gap:8px;}
  .checkchip{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;
    padding:7px 12px;font-size:13px;background:#fff;}
  .checkchip input{width:15px;height:15px;}

  .photofield .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .photofield .thumb{position:relative;width:76px;height:76px;border-radius:10px;overflow:hidden;
    border:1px solid var(--border);}
  .photofield .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photofield .thumb button{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;
    border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;line-height:1;}
  .photobtn{display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--navy);color:var(--navy);
    background:#EEF3FB;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer;}
  .photobtn input{display:none;}

  .toolbar{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--bg) 22%);
    padding:10px 0 4px;display:flex;gap:8px;}
  .toolbar .btn{flex:1;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,0.25);
    z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tip{font-size:11.5px;color:var(--muted);text-align:center;padding:14px 20px 4px;line-height:1.5;}

  @media print{
    header.topbar,.toolbar,.no-print{display:none !important;}
    details.section{border:none;box-shadow:none;}
    details.section > summary:after{display:none;}
    body{background:#fff;}
  }
</style>
</head>

<div id="app"></div>
<div class="toast" id="toast"></div>

const FORM_ORDER = ["fullSurvey","responder","audit","clientIntake"];

/* ============================= STATE ============================= */
let state = { view:"home", formType:null, entryId:null, values:{}, entryCache:{} };
let counts = {};
let autosaveTimer = null;

/* ============================= STORAGE HELPERS =============================
   Uses the browser's built-in localStorage so this file works standalone —
   just open it directly in a phone/desktop browser, no Claude connection needed.
   Data is saved on THIS device, in THIS browser, only. */
const LS_PREFIX = "cssf:"; // namespaced so we don't clash with anything else
async function storageGet(key){
  try{ const v = localStorage.getItem(LS_PREFIX+key); return v ? JSON.parse(v) : null; }
  catch(e){ return null; }
}
async function storageSet(key,val){
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); return true; }
  catch(e){ console.error(e); return false; }
}
async function storageDelete(key){
  try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){}
}
async function storageList(prefix){
  try{
    const full = LS_PREFIX+prefix;
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(full)===0) keys.push(k.substring(LS_PREFIX.length));
    }
    return keys;
  }catch(e){ return []; }
}

function entryKey(formType,id){ return "entry:"+formType+":"+id; }
function draftKey(formType){ return "draft:"+formType; }

async function loadEntries(formType){
  const keys = await storageList("entry:"+formType+":");
  const entries = [];
  for(const k of keys){
    const e = await storageGet(k);
    if(e) entries.push(e);
  }
  entries.sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
  return entries;
}
async function refreshCounts(){
  for(const ft of FORM_ORDER){
    const keys = await storageList("entry:"+ft+":");
    counts[ft] = keys.length;
  }
}

/* ============================= UTIL ============================= */
function el(tag, props, children){
  const e = document.createElement(tag);
  if(props) for(const k in props){
    if(k==="class") e.className = props[k];
    else if(k==="html") e.innerHTML = props[k];
    else if(k.startsWith("on")) e.addEventListener(k.substring(2), props[k]);
    else e.setAttribute(k, props[k]);
  }
  (children||[]).forEach(c=>{ if(c) e.appendChild(c); });
  return e;
}
function txt(s){ return document.createTextNode(s); }
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}
function entryDisplayName(schema, values){
  for(const f of schema.nameFields){ if(values[f]) return values[f]; }
  return "Untitled";
}
function fmtDate(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleDateString(undefined,{day:"2-digit",month:"short",year:"numeric"}) + " " +
         d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
}

/* ============================= PHOTO HANDLING ============================= */
function compressFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = function(){
        const maxDim = 1280;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",0.62));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================= RENDER: SHELL ============================= */
function renderShell(){
  const app = document.getElementById("app");
  app.innerHTML = "";
  const header = el("header",{class:"topbar"});
  const back = (state.view!=="home") ? el("button",{class:"backbtn", onclick:goBack, html:"&#8592;"}) : el("div",{style:"width:34px;"});
  const logowrap = el("div",{class:"logowrap"},[el("img",{src:LOGO_DATA_URL, alt:"CS Security UK"})]);
  const titles = el("div",{class:"titles"});
  let title="CS Security UK", sub="Site Forms";
  if(state.view==="list"){ title=FORM_SCHEMAS[state.formType].name; sub="Saved entries"; }
  if(state.view==="form"){ title=FORM_SCHEMAS[state.formType].name; sub = state.entryId ? "Editing entry" : "New entry"; }
  titles.appendChild(el("h1",{},[txt(title)]));
  titles.appendChild(el("p",{},[txt(sub)]));
  header.appendChild(back);
  header.appendChild(titles);
  header.appendChild(logowrap);
  header.appendChild(el("div",{class:"accent"}));
  app.appendChild(header);
  const main = el("main",{id:"main"});
  app.appendChild(main);
  return main;
}

function goBack(){
  if(state.view==="form"){ state.view="list"; renderList(); }
  else if(state.view==="list"){ state.view="home"; renderHome(); }
}

/* ============================= RENDER: HOME ============================= */
async function renderHome(){
  state.view="home"; state.formType=null; state.entryId=null;
  const main = renderShell();
  main.appendChild(el("div",{class:"hero"},[
    el("h2",{},[txt("Site Forms")]),
    el("p",{},[txt("Fill in survey, audit and client forms on your phone, attach photos, and keep everything in one place \u2014 no paper needed.")])
  ]));
  await refreshCounts();
  FORM_ORDER.forEach(ft=>{
    const schema = FORM_SCHEMAS[ft];
    const card = el("div",{class:"formcard", onclick:()=>openList(ft)},[
      el("div",{class:"icon", html:schema.icon}),
      el("div",{class:"body"},[
        el("h3",{},[txt(schema.name)]),
        el("p",{},[txt(schema.subtitle)])
      ]),
      el("div",{class:"count"},[txt((counts[ft]||0)+" saved")]),
      el("div",{class:"chev", html:"&#8250;"})
    ]);
    main.appendChild(card);
  });

  const backupRow = el("div",{style:"display:flex;gap:8px;margin-top:6px;"});
  backupRow.appendChild(el("button",{class:"btn btn-outline btn-sm", style:"flex:1;", onclick:exportBackup},[txt("Backup data")]));
  const importId = "importfile-"+Math.random().toString(36).slice(2);
  const importInput = el("input",{type:"file", accept:"application/json", id:importId, style:"display:none;"});
  importInput.addEventListener("change", (e)=>{ const f=e.target.files[0]; if(f) importBackup(f); });
  const importLabel = el("label",{class:"btn btn-outline btn-sm", for:importId, style:"flex:1;text-align:center;"},[txt("Restore backup")]);
  importLabel.appendChild(importInput);
  backupRow.appendChild(importLabel);
  main.appendChild(backupRow);

  main.appendChild(el("p",{class:"tip"},[txt("This copy saves entries in this browser on this device only (no Claude connection needed). Use \u201cBackup data\u201d regularly and keep the file somewhere safe \u2014 clearing browser data will erase saved entries.")]));
}

async function exportBackup(){
  const payload = { exportedAt: Date.now(), forms: {} };
  for(const ft of FORM_ORDER){
    payload.forms[ft] = await loadEntries(ft);
  }
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = "cs-security-site-forms-backup-"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  showToast("Backup file downloaded");
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const payload = JSON.parse(e.target.result);
      let count = 0;
      for(const ft of Object.keys(payload.forms||{})){
        for(const entry of payload.forms[ft]){
          await storageSet(entryKey(ft, entry.id), entry);
          count++;
        }
      }
      showToast("Restored "+count+" entries");
      renderHome();
    }catch(err){
      console.error(err);
      showToast("Couldn't read that backup file");
    }
  };
  reader.readAsText(file);
}


function openList(ft){ state.formType = ft; renderList(); }

/* ============================= RENDER: LIST ============================= */
async function renderList(){
  state.view="list";
  const main = renderShell();
  const schema = FORM_SCHEMAS[state.formType];
  main.appendChild(el("button",{class:"btn btn-gold fab-new", onclick:()=>openForm(state.formType,null)},[txt("+ New "+schema.name)]));
  const entries = await loadEntries(state.formType);
  if(entries.length===0){
    main.appendChild(el("div",{class:"empty"},[txt("No saved entries yet. Tap \u201c+ New\u201d to fill one in.")]));
    return;
  }
  entries.forEach(entry=>{
    const row = el("div",{class:"listrow"});
    const body = el("div",{class:"body", onclick:()=>openForm(state.formType, entry.id)},[
      el("h4",{},[txt(entryDisplayName(schema, entry.values))]),
      el("p",{},[txt(fmtDate(entry.updatedAt))])
    ]);
    const del = el("button",{class:"del", html:"&#128465;", onclick:async (e)=>{
      e.stopPropagation();
      if(confirm("Delete this entry? This can't be undone.")){
        await storageDelete(entryKey(state.formType, entry.id));
        showToast("Entry deleted");
        renderList();
      }
    }});
    row.appendChild(body); row.appendChild(del);
    main.appendChild(row);
  });
}

/* ============================= RENDER: FORM ============================= */
async function openForm(ft, entryId){
  state.formType = ft; state.entryId = entryId; state.view="form";
  if(entryId){
    const e = await storageGet(entryKey(ft, entryId));
    state.values = (e && e.values) ? e.values : {};
  } else {
    const draft = await storageGet(draftKey(ft));
    if(draft && Object.keys(draft).length){
      state.values = draft;
      showToast("Resumed your unsaved draft");
    } else {
      state.values = {};
      FORM_SCHEMAS[ft].sections.forEach(s=> s.fields.forEach(f=>{
        if(f.default!==undefined) state.values[f.key] = f.default;
      }));
    }
  }
  renderForm();
}

function scheduleDraftSave(){
  if(state.entryId) return; // only draft new entries
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(()=>{ storageSet(draftKey(state.formType), state.values); }, 900);
}

function renderForm(){
  const main = renderShell();
  const schema = FORM_SCHEMAS[state.formType];
  const form = el("div",{});
  schema.sections.forEach((section, idx)=>{
    const details = el("details",{class:"section"});
    if(idx===0) details.setAttribute("open","");
    details.appendChild(el("summary",{},[txt(section.title)]));
    const inner = el("div",{class:"inner"});
    if(section.note) inner.appendChild(el("p",{class:"section-note"},[txt(section.note)]));
    if(section.info) inner.appendChild(el("div",{class:"info-box"},[txt(section.info)]));
    section.fields.forEach(f=> inner.appendChild(renderField(f)));
    details.appendChild(inner);
    form.appendChild(details);
  });
  main.appendChild(form);

  const toolbar = el("div",{class:"toolbar no-print"});
  toolbar.appendChild(el("button",{class:"btn btn-outline", onclick:copySummary},[txt("Copy summary")]));
  toolbar.appendChild(el("button",{class:"btn btn-outline", onclick:()=>window.print()},[txt("Print / PDF")]));
  toolbar.appendChild(el("button",{class:"btn btn-primary", onclick:saveEntry},[txt("Save")]));
  main.appendChild(toolbar);
}

function renderField(f){
  const wrap = el("div",{class:"field"});
  wrap.appendChild(el("label",{},[txt(f.label)]));
  const val = state.values[f.key];

  if(f.type==="textarea"){
    const ta = el("textarea",{});
    ta.value = val || "";
    ta.addEventListener("input", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(ta);
  }
  else if(f.type==="select"){
    const sel = el("select",{});
    sel.appendChild(el("option",{value:""},[txt("Select...")]));
    f.options.forEach(o=>{
      const opt = el("option",{value:o},[txt(o)]);
      if(val===o) opt.setAttribute("selected","");
      sel.appendChild(opt);
    });
    sel.addEventListener("change", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(sel);
  }
  else if(f.type==="checkboxGroup"){
    const grid = el("div",{class:"checkgrid"});
    const arr = Array.isArray(val) ? val : [];
    f.options.forEach(o=>{
      const cb = el("input",{type:"checkbox", value:o});
      if(arr.includes(o)) cb.checked = true;
      cb.addEventListener("change", e=>{
        let cur = Array.isArray(state.values[f.key]) ? state.values[f.key].slice() : [];
        if(e.target.checked){ if(!cur.includes(o)) cur.push(o); }
        else{ cur = cur.filter(x=>x!==o); }
        state.values[f.key] = cur;
        scheduleDraftSave();
      });
      const chip = el("label",{class:"checkchip"},[cb, txt(o)]);
      grid.appendChild(chip);
    });
    wrap.appendChild(grid);
  }
  else if(f.type==="photo"){
    wrap.classList.add("photofield");
    const thumbs = el("div",{class:"thumbs"});
    const photos = Array.isArray(val) ? val : [];
    function renderThumbs(){
      thumbs.innerHTML="";
      (state.values[f.key]||[]).forEach((dataUrl, i)=>{
        const thumb = el("div",{class:"thumb"},[
          el("img",{src:dataUrl}),
          el("button",{html:"&times;", onclick:()=>{
            state.values[f.key].splice(i,1);
            renderThumbs();
            scheduleDraftSave();
          }})
        ]);
        thumbs.appendChild(thumb);
      });
    }
    renderThumbs();
    const inputId = "photoinput-"+f.key+"-"+Math.random().toString(36).slice(2);
    const input = el("input",{type:"file", accept:"image/*", capture:"environment", multiple:"multiple", id:inputId});
    input.addEventListener("change", async (e)=>{
      const files = Array.from(e.target.files||[]);
      if(!files.length) return;
      showToast("Processing photo(s)...");
      if(!Array.isArray(state.values[f.key])) state.values[f.key] = [];
      for(const file of files){
        try{ const durl = await compressFile(file); state.values[f.key].push(durl); }
        catch(err){ console.error(err); }
      }
      renderThumbs();
      scheduleDraftSave();
      input.value = "";
    });
    const label = el("label",{class:"photobtn", for:inputId, html:"&#128247;&nbsp; Add photo"});
    label.appendChild(input);
    wrap.appendChild(thumbs);
    wrap.appendChild(label);
  }
  else{
    const inp = el("input",{type:f.type});
    inp.value = val || "";
    inp.addEventListener("input", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(inp);
  }
  return wrap;
}

/* ============================= SAVE / SUMMARY ============================= */
async function saveEntry(){
  const ft = state.formType;
  const id = state.entryId || (Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  const now = Date.now();
  const existing = state.entryId ? await storageGet(entryKey(ft,id)) : null;
  const entry = {
    id, formType: ft,
    createdAt: existing ? existing.createdAt : now,
    updatedAt: now,
    values: state.values
  };
  const ok = await storageSet(entryKey(ft,id), entry);
  if(ok){
    state.entryId = id;
    await storageDelete(draftKey(ft));
    showToast("Saved");
    renderList();
  } else {
    showToast("Save failed \u2014 try again");
  }
}

function copySummary(){
  const schema = FORM_SCHEMAS[state.formType];
  let lines = [schema.name + " \u2014 " + entryDisplayName(schema, state.values), ""];
  schema.sections.forEach(section=>{
    lines.push(section.title);
    section.fields.forEach(f=>{
      if(f.type==="photo") return;
      let v = state.values[f.key];
      if(Array.isArray(v)) v = v.join(", ");
      lines.push("  "+f.label+": "+(v || "-"));
    });
    lines.push("");
  });
  const text = lines.join("\n");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast("Summary copied")).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); showToast("Summary copied"); }
  catch(e){ showToast("Couldn't copy \u2014 select manually"); }
  document.body.removeChild(ta);
}

/* ============================= INIT ============================= */
