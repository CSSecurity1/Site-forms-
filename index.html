<style>
  :root{
    --navy:#144580;
    --navy-dark:#0d3260;
    --gold:#FAD30A;
    --bg:#F4F6F9;
    --card:#FFFFFF;
    --text:#1A2233;
    --muted:#5C6B85;
    --border:#DCE3EE;
    --danger:#B3261E;
    --danger-bg:#FDEDEC;
    --ok:#1E7B45;
    --radius:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  #app{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;
    padding-bottom:calc(24px + env(safe-area-inset-bottom));}

  header.topbar{
    position:sticky;top:0;z-index:20;
    background:var(--navy);color:#fff;
    padding:calc(10px + env(safe-area-inset-top)) 14px 12px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 2px 10px rgba(20,69,128,0.25);
  }
  header.topbar .backbtn{
    width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,0.14);
    color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex:none;
  }
  header.topbar .titles{flex:1;min-width:0;}
  header.topbar h1{margin:0;font-size:17px;font-weight:700;line-height:1.2;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header.topbar p{margin:1px 0 0;font-size:11.5px;color:rgba(255,255,255,0.75);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  header.topbar .accent{height:3px;background:linear-gradient(90deg,var(--gold),transparent 85%);
    position:absolute;left:0;bottom:-3px;width:100%;}
  header.topbar .logowrap{width:34px;height:34px;border-radius:9px;background:#fff;
    display:flex;align-items:center;justify-content:center;flex:none;overflow:hidden;padding:3px;}
  header.topbar .logowrap img{width:100%;height:100%;object-fit:contain;}

  main{flex:1;padding:16px 14px 8px;}

  .hero{
    background:linear-gradient(135deg,var(--navy) 0%, var(--navy-dark) 100%);
    border-radius:18px;padding:20px 18px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden;
  }
  .hero:after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;
    background:radial-gradient(circle,rgba(250,211,10,0.35),transparent 70%);}
  .hero h2{margin:0 0 4px;font-size:19px;}
  .hero p{margin:0;font-size:13px;color:rgba(255,255,255,0.8);line-height:1.45;}

  .formcard{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 14px;margin-bottom:12px;display:flex;align-items:center;gap:12px;
    cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;
  }
  .formcard:active{transform:scale(0.98);}
  .formcard .icon{width:42px;height:42px;border-radius:11px;background:#EEF3FB;color:var(--navy);
    display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
  .formcard .body{flex:1;min-width:0;}
  .formcard .body h3{margin:0 0 2px;font-size:15px;color:var(--text);}
  .formcard .body p{margin:0;font-size:12.5px;color:var(--muted);}
  .formcard .count{font-size:11.5px;color:var(--navy);background:#EEF3FB;padding:3px 9px;
    border-radius:999px;font-weight:600;flex:none;}
  .formcard .chev{color:var(--muted);font-size:16px;flex:none;}

  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);
    font-weight:700;margin:22px 2px 8px;}

  .listrow{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;cursor:pointer;}
  .listrow .body{flex:1;min-width:0;}
  .listrow .body h4{margin:0 0 2px;font-size:14.5px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .listrow .body p{margin:0;font-size:12px;color:var(--muted);}
  .listrow .del{width:32px;height:32px;border-radius:9px;border:none;background:var(--danger-bg);
    color:var(--danger);font-size:15px;flex:none;}

  .btn{border:none;border-radius:11px;padding:11px 16px;font-size:14.5px;font-weight:600;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-gold{background:var(--gold);color:var(--navy-dark);}
  .btn-outline{background:#fff;border:1px solid var(--border);color:var(--text);}
  .btn-block{width:100%;}
  .btn-sm{padding:8px 12px;font-size:13px;}
  .fab-new{width:100%;margin-bottom:16px;padding:13px;font-size:15px;}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:30px 10px;}

  details.section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    margin-bottom:10px;overflow:hidden;}
  details.section > summary{list-style:none;padding:13px 14px;font-weight:700;font-size:14.5px;
    color:var(--navy);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
  details.section > summary::-webkit-details-marker{display:none;}
  details.section > summary:after{content:"+";font-size:18px;font-weight:400;color:var(--muted);}
  details.section[open] > summary:after{content:"\2212";}
  details.section .inner{padding:2px 14px 14px;}
  .section-note{font-size:12px;color:var(--muted);margin:-2px 0 10px;font-style:italic;}
  .info-box{background:#EEF3FB;border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--navy);
    margin:10px 0 4px;}

  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;}
  .field input[type=text],.field input[type=tel],.field input[type=email],
  .field input[type=date],.field select,.field textarea{
    width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 11px;font-size:14.5px;
    background:#fff;color:var(--text);font-family:inherit;
  }
  .field textarea{min-height:64px;resize:vertical;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--navy);outline-offset:1px;}
  .checkgrid{display:flex;flex-wrap:wrap;gap:8px;}
  .checkchip{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;
    padding:7px 12px;font-size:13px;background:#fff;}
  .checkchip input{width:15px;height:15px;}

  .photofield .thumbs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
  .photofield .thumb{position:relative;width:76px;height:76px;border-radius:10px;overflow:hidden;
    border:1px solid var(--border);}
  .photofield .thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photofield .thumb button{position:absolute;top:2px;right:2px;width:20px;height:20px;border:none;
    border-radius:50%;background:rgba(0,0,0,0.55);color:#fff;font-size:12px;line-height:1;}
  .photobtn{display:inline-flex;align-items:center;gap:6px;border:1px dashed var(--navy);color:var(--navy);
    background:#EEF3FB;border-radius:10px;padding:10px 14px;font-size:13.5px;font-weight:600;cursor:pointer;}
  .photobtn input{display:none;}

  .toolbar{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--bg) 22%);
    padding:10px 0 4px;display:flex;gap:8px;}
  .toolbar .btn{flex:1;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--navy);
    color:#fff;padding:11px 18px;border-radius:999px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,0.25);
    z-index:100;opacity:0;pointer-events:none;transition:opacity .2s ease, transform .2s ease;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .tip{font-size:11.5px;color:var(--muted);text-align:center;padding:14px 20px 4px;line-height:1.5;}

  /* ---- gear / settings icon ---- */
  header.topbar .gearbtn{width:34px;height:34px;border-radius:10px;border:none;background:rgba(255,255,255,0.14);
    color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;flex:none;}

  /* ---- lock screen ---- */
  .lockwrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;text-align:center;}
  .lockwrap .lockicon{width:64px;height:64px;border-radius:18px;background:var(--navy);color:var(--gold);
    display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:18px;}
  .lockwrap h2{margin:0 0 6px;font-size:19px;color:var(--text);}
  .lockwrap p{margin:0 0 18px;font-size:13px;color:var(--muted);}
  .pininput{font-size:26px;letter-spacing:10px;text-align:center;width:200px;border:1px solid var(--border);
    border-radius:12px;padding:12px;background:#fff;color:var(--text);}
  .lockwrap .forgot{margin-top:16px;font-size:12.5px;color:var(--muted);text-decoration:underline;background:none;border:none;}

  /* ---- settings page ---- */
  .settings-field{margin-bottom:16px;}
  .settings-field label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .settings-field input[type=text],.settings-field input[type=email],.settings-field input[type=tel]{
    width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 11px;font-size:14.5px;background:#fff;color:var(--text);}
  .settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
  .switch{position:relative;width:46px;height:26px;flex:none;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .slider{position:absolute;inset:0;background:#ccc;border-radius:999px;transition:.15s;cursor:pointer;}
  .switch .slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.15s;}
  .switch input:checked + .slider{background:var(--navy);}
  .switch input:checked + .slider:before{transform:translateX(20px);}

  /* ---- signature pad ---- */
  .sigpad{border:1px solid var(--border);border-radius:10px;background:#fff;touch-action:none;width:100%;height:140px;display:block;}
  .sigrow{display:flex;justify-content:flex-end;margin-top:6px;}

  /* ---- search box in list ---- */
  .searchbox{margin-bottom:12px;}
  .searchbox input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14.5px;background:#fff;color:var(--text);}

  /* ---- toolbar as 2x2 grid on narrow screens ---- */
  .toolbar{flex-wrap:wrap;}
  .toolbar .btn{flex:1 1 45%;min-width:120px;}

  /* ---- tablet / iPad widening ---- */
  @media (min-width: 700px){
    #app{max-width:760px;}
    main{padding:22px 32px 10px;}
    .hero{padding:28px 30px;}
    .formcard{padding:18px 20px;}
    .formcard .icon{width:48px;height:48px;font-size:22px;}
    header.topbar{padding-left:22px;padding-right:22px;}
    .toolbar .btn{flex:1 1 22%;}
  }
  @media (min-width: 1000px){
    #app{max-width:920px;}
    main{padding:26px 40px 12px;}

/* ============================= STORAGE HELPERS =============================
   Uses IndexedDB (hundreds of MB of headroom on iOS, vs ~5MB for localStorage —
   important once photos start piling up over months of real use). Falls back
   to localStorage automatically if IndexedDB isn't available for any reason.
   Any data already saved under the old localStorage-only version is copied
   over automatically, once, the first time this version runs. */
const LS_PREFIX = "cssf:"; // namespaced so we don't clash with anything else
const DB_NAME = "cssf_db";
const DB_VERSION = 1;
const STORE_NAME = "kv";
let IDB_AVAILABLE = typeof indexedDB !== "undefined";
let dbPromise = null;

function openDB(){
  if(dbPromise) return dbPromise;
  dbPromise = new Promise((resolve,reject)=>{
    try{
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = ()=>{
        const db = req.result;
        if(!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, {keyPath:"key"});
      };
      req.onsuccess = ()=> resolve(req.result);
      req.onerror = ()=> reject(req.error);
    }catch(e){ reject(e); }
  });
  return dbPromise;
}
function idbGet(key){
  return openDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readonly");
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = ()=> resolve(req.result ? req.result.value : null);
    req.onerror = ()=> reject(req.error);
  }));
}
function idbSet(key,value){
  return openDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).put({key,value});
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  }));
}
function idbDelete(key){
  return openDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).delete(key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  }));
}
function idbListKeys(prefix){
  return openDB().then(db=> new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readonly");
    const keys = [];
    const req = tx.objectStore(STORE_NAME).openCursor();
    req.onsuccess = (e)=>{
      const cursor = e.target.result;
      if(cursor){
        if(!prefix || String(cursor.key).indexOf(prefix)===0) keys.push(cursor.key);
        cursor.continue();
      } else resolve(keys);
    };
    req.onerror = ()=> reject(req.error);
  }));
}

async function storageGet(key){
  if(IDB_AVAILABLE){
    try{ return await idbGet(key); }catch(e){ console.error(e); IDB_AVAILABLE=false; }
  }
  try{ const v = localStorage.getItem(LS_PREFIX+key); return v ? JSON.parse(v) : null; }
  catch(e){ return null; }
}
async function storageSet(key,val){
  if(IDB_AVAILABLE){
    try{ return await idbSet(key,val); }catch(e){ console.error(e); IDB_AVAILABLE=false; }
  }
  try{ localStorage.setItem(LS_PREFIX+key, JSON.stringify(val)); return true; }
  catch(e){ console.error(e); return false; }
}
async function storageDelete(key){
  if(IDB_AVAILABLE){
    try{ return await idbDelete(key); }catch(e){ console.error(e); IDB_AVAILABLE=false; }
  }
  try{ localStorage.removeItem(LS_PREFIX+key); }catch(e){}
}
async function storageList(prefix){
  if(IDB_AVAILABLE){
    try{ return await idbListKeys(prefix); }catch(e){ console.error(e); IDB_AVAILABLE=false; }
  }
  try{
    const full = LS_PREFIX+prefix;
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(full)===0) keys.push(k.substring(LS_PREFIX.length));
    }
    return keys;
  }catch(e){ return []; }
}

async function migrateFromLocalStorageIfNeeded(){
  if(!IDB_AVAILABLE) return;
  try{
    const already = await idbGet("__migrated_from_localstorage__");
    if(already) return;
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(k && k.indexOf(LS_PREFIX)===0){
        const shortKey = k.substring(LS_PREFIX.length);
        const raw = localStorage.getItem(k);
        let val; try{ val = JSON.parse(raw); }catch(e){ val = raw; }
        await idbSet(shortKey, val);
      }
    }
    await idbSet("__migrated_from_localstorage__", true);
  }catch(e){ console.error("Migration to IndexedDB failed, staying on localStorage this run", e); }
}

function entryKey(formType,id){ return "entry:"+formType+":"+id; }
function draftKey(formType){ return "draft:"+formType; }
const SETTINGS_KEY = "settings";
async function loadSettings(){
  const s = await storageGet(SETTINGS_KEY);
  if(s) settings = Object.assign({pin:null, officeEmail:"", lastBackupAt:null}, s);
}
async function saveSettings(){

async function loadEntries(formType){
  const keys = await storageList("entry:"+formType+":");
  const entries = [];
  for(const k of keys){
    const e = await storageGet(k);
    if(e) entries.push(e);
  }
  entries.sort((a,b)=> (b.updatedAt||0)-(a.updatedAt||0));
  return entries;
}
async function refreshCounts(){

/* ============================= UTIL ============================= */
function el(tag, props, children){
  const e = document.createElement(tag);
  if(props) for(const k in props){
    if(k==="class") e.className = props[k];
    else if(k==="html") e.innerHTML = props[k];
    else if(k.startsWith("on")) e.addEventListener(k.substring(2), props[k]);
    else e.setAttribute(k, props[k]);
  }
  (children||[]).forEach(c=>{ if(c) e.appendChild(c); });
  return e;
}
function txt(s){ return document.createTextNode(s); }
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove("show"), 2200);
}
function entryDisplayName(schema, values){
  for(const f of schema.nameFields){ if(values[f]) return values[f]; }
  return "Untitled";
}
function fmtDate(ts){
  if(!ts) return "";
  const d = new Date(ts);
  return d.toLocaleDateString(undefined,{day:"2-digit",month:"short",year:"numeric"}) + " " +
         d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
}

/* ============================= PHOTO HANDLING ============================= */
function compressFile(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = function(){
        const maxDim = 1280;
        let w = img.width, h = img.height;
        if(w > h && w > maxDim){ h = Math.round(h * maxDim / w); w = maxDim; }
        else if(h >= w && h > maxDim){ w = Math.round(w * maxDim / h); h = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg",0.62));
      };
      img.onerror = reject;
      img.src = ev.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function renderLock(mode, onSuccess){
  // mode: 'unlock' (existing PIN) or 'setup' (first time choosing a PIN)
  onSuccess = onSuccess || renderCurrentView;
  const app = document.getElementById("app");
  app.innerHTML = "";
  const wrap = el("div",{class:"lockwrap"});
  wrap.appendChild(el("div",{class:"lockicon", html:"&#128274;"}));
  wrap.appendChild(el("h2",{},[txt(mode==="setup" ? "Set a PIN" : "Enter PIN")]));
  wrap.appendChild(el("p",{},[txt(mode==="setup"
    ? "This locks the app on this phone. It's a deterrent, not encryption \u2014 choose 4-6 digits."
    : "CS Security UK \u2014 Site Forms is locked.")]));
  const input = el("input",{class:"pininput", type:"tel", inputmode:"numeric", maxlength:"6", autofocus:"autofocus"});
  wrap.appendChild(input);
  const err = el("p",{style:"color:var(--danger);font-size:12.5px;min-height:16px;margin-top:10px;"});
  wrap.appendChild(err);
  const btn = el("button",{class:"btn btn-primary", style:"margin-top:14px;width:200px;"},[txt(mode==="setup" ? "Set PIN" : "Unlock")]);
  wrap.appendChild(btn);

  async function submit(){
    const v = input.value.trim();
    if(v.length < 4){ err.textContent = "PIN must be at least 4 digits."; return; }
    if(mode==="setup"){
      settings.pin = v;
      await saveSettings();
      unlocked = true;
      showToast("PIN set");
      onSuccess();
    } else {
      if(v === settings.pin){
        unlocked = true;
        onSuccess();
      } else {
        err.textContent = "Incorrect PIN. Try again.";
        input.value = "";
      }
    }
  }
  btn.addEventListener("click", submit);
  input.addEventListener("keydown", e=>{ if(e.key==="Enter") submit(); });

  if(mode==="unlock"){
    const forgot = el("button",{class:"forgot"},[txt("Forgot PIN?")]);
    forgot.addEventListener("click", async ()=>{
      if(confirm("This removes the PIN lock (it can't verify your identity, so there's no secure reset). Your saved entries are not affected. Remove the PIN?")){
        settings.pin = null;
        await saveSettings();
        unlocked = true;
        onSuccess();
      }
    });
    wrap.appendChild(forgot);
  }
  app.appendChild(wrap);
  setTimeout(()=>input.focus(), 50);
}

let hiddenAt = null;
document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "hidden"){
    hiddenAt = Date.now();
  } else if(document.visibilityState === "visible"){
    const wasAwayLong = hiddenAt && (Date.now() - hiddenAt > 30000);
    hiddenAt = null;
    if(settings.pin && wasAwayLong){
      unlocked = false;
      renderLock("unlock", renderCurrentView);
    }
  }
});

async function exportBackup(){
  const payload = { exportedAt: Date.now(), forms: {} };
  for(const ft of FORM_ORDER){
    payload.forms[ft] = await loadEntries(ft);
  }
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const stamp = new Date().toISOString().slice(0,10);
  a.href = url; a.download = "cs-security-site-forms-backup-"+stamp+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
  settings.lastBackupAt = Date.now();
  await saveSettings();
  showToast("Backup file downloaded");
  if(state.view==="home") renderHome();
}

function importBackup(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const payload = JSON.parse(e.target.result);
      let count = 0;
      for(const ft of Object.keys(payload.forms||{})){
        for(const entry of payload.forms[ft]){
          await storageSet(entryKey(ft, entry.id), entry);
          count++;
        }
      }
      showToast("Restored "+count+" entries");
      renderHome();
    }catch(err){
      console.error(err);
      showToast("Couldn't read that backup file");
    }
  };
  reader.readAsText(file);
}

function renderField(f){
  const wrap = el("div",{class:"field"});
  wrap.appendChild(el("label",{},[txt(f.label)]));
  const val = state.values[f.key];

  if(f.type==="textarea"){
    const ta = el("textarea",{});
    ta.value = val || "";
    ta.addEventListener("input", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(ta);
  }
  else if(f.type==="select"){
    const sel = el("select",{});
    sel.appendChild(el("option",{value:""},[txt("Select...")]));
    f.options.forEach(o=>{
      const opt = el("option",{value:o},[txt(o)]);
      if(val===o) opt.setAttribute("selected","");
      sel.appendChild(opt);
    });
    sel.addEventListener("change", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(sel);
  }
  else if(f.type==="checkboxGroup"){
    const grid = el("div",{class:"checkgrid"});
    const arr = Array.isArray(val) ? val : [];
    f.options.forEach(o=>{
      const cb = el("input",{type:"checkbox", value:o});
      if(arr.includes(o)) cb.checked = true;
      cb.addEventListener("change", e=>{
        let cur = Array.isArray(state.values[f.key]) ? state.values[f.key].slice() : [];
        if(e.target.checked){ if(!cur.includes(o)) cur.push(o); }
        else{ cur = cur.filter(x=>x!==o); }
        state.values[f.key] = cur;
        scheduleDraftSave();
      });
      const chip = el("label",{class:"checkchip"},[cb, txt(o)]);
      grid.appendChild(chip);
    });
    wrap.appendChild(grid);
  }
  else if(f.type==="photo"){
    wrap.classList.add("photofield");
    const thumbs = el("div",{class:"thumbs"});
    const photos = Array.isArray(val) ? val : [];
    function renderThumbs(){
      thumbs.innerHTML="";
      (state.values[f.key]||[]).forEach((dataUrl, i)=>{
        const thumb = el("div",{class:"thumb"},[
          el("img",{src:dataUrl}),
          el("button",{html:"&times;", onclick:()=>{
            state.values[f.key].splice(i,1);
            renderThumbs();
            scheduleDraftSave();
          }})
        ]);
        thumbs.appendChild(thumb);
      });
    }
    renderThumbs();
    const inputId = "photoinput-"+f.key+"-"+Math.random().toString(36).slice(2);
    const input = el("input",{type:"file", accept:"image/*", capture:"environment", multiple:"multiple", id:inputId});
    input.addEventListener("change", async (e)=>{
      const files = Array.from(e.target.files||[]);
      if(!files.length) return;
      showToast("Processing photo(s)...");
      if(!Array.isArray(state.values[f.key])) state.values[f.key] = [];
      for(const file of files){
        try{ const durl = await compressFile(file); state.values[f.key].push(durl); }
        catch(err){ console.error(err); }
      }
      renderThumbs();
      scheduleDraftSave();
      input.value = "";
    });
    const label = el("label",{class:"photobtn", for:inputId, html:"&#128247;&nbsp; Add photo"});
    label.appendChild(input);
    wrap.appendChild(thumbs);
    wrap.appendChild(label);
  }
  else if(f.type==="signature"){
    const canvas = el("canvas",{class:"sigpad"});
    wrap.appendChild(canvas);
    const sigrow = el("div",{class:"sigrow"});
    const clearBtn = el("button",{class:"btn btn-outline btn-sm"},[txt("Clear")]);
    sigrow.appendChild(clearBtn);
    wrap.appendChild(sigrow);

    function sizeCanvas(){
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      const ctx = canvas.getContext("2d");
      ctx.scale(ratio, ratio);
      ctx.lineWidth = 2;
      ctx.lineCap = "round";
      ctx.strokeStyle = "#1A2233";
      if(state.values[f.key]){
        const img = new Image();
        img.onload = ()=> ctx.drawImage(img, 0, 0, rect.width, rect.height);
        img.src = state.values[f.key];
      }
    }
    canvas._resize = sizeCanvas;

    let drawing = false, lastX=0, lastY=0;
    function pos(e){
      const rect = canvas.getBoundingClientRect();
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }
    function start(e){
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      drawing = true;
      const p = pos(e); lastX=p.x; lastY=p.y;
    }
    function move(e){
      if(!drawing) return;
      e.preventDefault();
      const ctx = canvas.getContext("2d");
      const p = pos(e);
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(p.x,p.y);
      ctx.stroke();
      lastX=p.x; lastY=p.y;
    }
    function end(e){
      if(!drawing) return;
      drawing = false;
      if(e && e.pointerId!==undefined){ try{ canvas.releasePointerCapture(e.pointerId); }catch(err){} }
      state.values[f.key] = canvas.toDataURL("image/png");
      scheduleDraftSave();
    }
    canvas.addEventListener("pointerdown", start);
    canvas.addEventListener("pointermove", move);
    canvas.addEventListener("pointerup", end);
    canvas.addEventListener("pointercancel", end);

    clearBtn.addEventListener("click", ()=>{
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0,0,canvas.width,canvas.height);
      state.values[f.key] = null;
      scheduleDraftSave();
    });
  }
  else if(f.type==="what3words"){
    const inp = el("input",{type:"text", placeholder:"///word.word.word"});
    inp.value = val || "";
    wrap.appendChild(inp);

    const w3wLink = el("a",{href:"#", target:"_blank", rel:"noopener",
      style:"display:none;font-size:12.5px;color:var(--navy);text-decoration:underline;margin-top:6px;"},
      [txt("Open in What3Words \u2192")]);
    function updateW3WLink(){
      const v = (inp.value||"").trim().replace(/^\/+/, "");
      if(v){ w3wLink.href = "https://what3words.com/"+encodeURIComponent(v); w3wLink.style.display = "inline-block"; }
      else{ w3wLink.style.display = "none"; }
    }
    inp.addEventListener("input", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); updateW3WLink(); });
    updateW3WLink();
    wrap.appendChild(w3wLink);

    const gpsRow = el("div",{style:"margin-top:10px;"});
    const gpsBtn = el("button",{class:"btn btn-outline btn-sm", type:"button"},[txt("\uD83D\uDCCD Use my current location")]);
    const gpsInfo = el("div",{style:"font-size:12px;color:var(--muted);margin-top:6px;"});
    function renderGpsInfo(){
      gpsInfo.innerHTML = "";
      const g = state.values[f.key+"_gps"];
      if(g){
        gpsInfo.appendChild(txt("GPS: "+g.lat.toFixed(5)+", "+g.lon.toFixed(5)+" (\u00b1"+Math.round(g.accuracy)+"m) \u00b7 "));
        gpsInfo.appendChild(el("a",{href:"https://maps.google.com/?q="+g.lat+","+g.lon, target:"_blank", rel:"noopener",
          style:"color:var(--navy);text-decoration:underline;"},[txt("View on map")]));
        const clearGps = el("button",{style:"margin-left:8px;background:none;border:none;color:var(--danger);font-size:12px;text-decoration:underline;padding:0;"},[txt("Clear")]);
        clearGps.addEventListener("click", ()=>{ state.values[f.key+"_gps"] = null; scheduleDraftSave(); renderGpsInfo(); });
        gpsInfo.appendChild(clearGps);
      }
    }
    gpsBtn.addEventListener("click", ()=>{
      if(!navigator.geolocation){ showToast("Location not supported on this device"); return; }
      gpsBtn.disabled = true; gpsBtn.textContent = "Getting location...";
      navigator.geolocation.getCurrentPosition(
        (pos)=>{
          state.values[f.key+"_gps"] = { lat: pos.coords.latitude, lon: pos.coords.longitude, accuracy: pos.coords.accuracy, capturedAt: Date.now() };
          scheduleDraftSave();
          renderGpsInfo();
          gpsBtn.disabled = false; gpsBtn.innerHTML = "\uD83D\uDCCD Use my current location";
          showToast("Location captured");
        },
        ()=>{
          gpsBtn.disabled = false; gpsBtn.innerHTML = "\uD83D\uDCCD Use my current location";
          showToast("Couldn't get location \u2014 check permissions");
        },
        { enableHighAccuracy:true, timeout:10000 }
      );
    });
    renderGpsInfo();
    gpsRow.appendChild(gpsBtn);
    gpsRow.appendChild(gpsInfo);
    wrap.appendChild(gpsRow);
  }
  else{
    const inp = el("input",{type:f.type});
    inp.value = val || "";
    inp.addEventListener("input", e=>{ state.values[f.key]=e.target.value; scheduleDraftSave(); });
    wrap.appendChild(inp);
  }
  return wrap;
}

/* ============================= SAVE / SUMMARY ============================= */
async function saveEntry(){
  const ft = state.formType;
  const schema = FORM_SCHEMAS[ft];
  const displayName = entryDisplayName(schema, state.values);
  if(displayName === "Untitled"){
    let label = "a name";
    outer:
    for(const key of schema.nameFields){
      for(const section of schema.sections){
        const f = section.fields.find(x=>x.key===key);
        if(f){ label = f.label; break outer; }
      }
    }
    if(!confirm("No "+label+" entered \u2014 this will be saved as \u201cUntitled\u201d and may be hard to find later. Save anyway?")){
      return;
    }
  }
  const id = state.entryId || (Date.now().toString(36)+Math.random().toString(36).slice(2,6));
  const now = Date.now();
  const existing = state.entryId ? await storageGet(entryKey(ft,id)) : null;
  const entry = {
    id, formType: ft,
    createdAt: existing ? existing.createdAt : now,
    updatedAt: now,
    values: state.values
  };
  const ok = await storageSet(entryKey(ft,id), entry);
  if(ok){
    state.entryId = id;
    await storageDelete(draftKey(ft));
    showToast("Saved");
    renderList();
  } else {
    showToast("Save failed \u2014 try again");
  }
}

function buildSummaryLines(){
  const schema = FORM_SCHEMAS[state.formType];
  let lines = [schema.name + " \u2014 " + entryDisplayName(schema, state.values), ""];
  schema.sections.forEach(section=>{
    lines.push(section.title);
    section.fields.forEach(f=>{
      if(f.type==="photo") return;
      if(f.type==="signature"){ lines.push("  "+f.label+": "+(state.values[f.key] ? "Signed" : "Not signed")); return; }
      let v = state.values[f.key];
      if(Array.isArray(v)) v = v.join(", ");
      lines.push("  "+f.label+": "+(v || "-"));
      if(f.type==="what3words"){
        const g = state.values[f.key+"_gps"];
        if(g) lines.push("  GPS: "+g.lat.toFixed(5)+", "+g.lon.toFixed(5)+" (\u00b1"+Math.round(g.accuracy)+"m)");
      }
    });
    lines.push("");
  });
  return lines;
}

function copySummary(){
  const text = buildSummaryLines().join("\n");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast("Summary copied")).catch(()=>fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); showToast("Summary copied"); }
  catch(e){ showToast("Couldn't copy \u2014 select manually"); }
  document.body.removeChild(ta);
}

/* ============================= SHARE / EMAIL ============================= */
function dataUrlToFile(dataUrl, filename){
  const parts = dataUrl.split(",");
  const mimeMatch = parts[0].match(/:(.*?);/);
  const mime = mimeMatch ? mimeMatch[1] : "application/octet-stream";
  const bin = atob(parts[1]);
  const arr = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
  return new File([arr], filename, {type: mime});
}

async function shareEntry(){
  const schema = FORM_SCHEMAS[state.formType];
  const title = schema.name + " \u2014 " + entryDisplayName(schema, state.values);
  const text = buildSummaryLines().join("\n");

  const files = [];
  let idx = 0;
  schema.sections.forEach(section=>{
    section.fields.forEach(f=>{
      if(f.type==="photo" && Array.isArray(state.values[f.key])){
        state.values[f.key].forEach(durl=>{
          try{ files.push(dataUrlToFile(durl, "photo-"+(++idx)+".jpg")); }catch(e){}
        });
      } else if(f.type==="signature" && state.values[f.key]){
        try{ files.push(dataUrlToFile(state.values[f.key], f.key+"-signature.png")); }catch(e){}
      }
    });
  });

  if(navigator.share){
    try{
      const shareData = { title, text };
      if(files.length && navigator.canShare && navigator.canShare({files})){
        shareData.files = files;
      }
      await navigator.share(shareData);
      return;
    }catch(e){
      if(e && e.name === "AbortError") return; // user cancelled — not an error
    }
  }
  mailtoFallback(title, text, files.length>0);
}

function mailtoFallback(title, text, hasAttachments){
  if(!settings.officeEmail){
    showToast("Add an office email in Settings first");
    return;
  }
  let body = text;
  if(hasAttachments) body += "\n\n(Photos/signatures aren't attached automatically this way \u2014 attach them from your camera roll if needed.)";
  const url = "mailto:"+settings.officeEmail+"?subject="+encodeURIComponent(title)+"&body="+encodeURIComponent(body);
  window.location.href = url;
}

/* ============================= INIT ============================= */
(async function init(){
  await migrateFromLocalStorageIfNeeded();
  await loadSettings();
  if(settings.pin){
    renderLock("unlock", renderHome);
  } else {
    renderHome();
  }
})();

/* ============================= OFFLINE (SERVICE WORKER) =============================
   Caches this page so it can still open with no signal, once it's been opened
   online at least once. Requires sw.js to be uploaded alongside this file. */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{ /* fine if missing — app still works online */ });
  });
}
